services:
  db:
    image: postgis/postgis:16-3.4
    container_name: primeair-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: primeair
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d primeair"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db-data:
